services:
  app:
    build: .
    ports:
      - "9552:9552"
    volumes:
      - ./data:/app/data
      - ./apps:/app/apps
      - ./config.yaml:/app/config.yaml
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:9552/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
