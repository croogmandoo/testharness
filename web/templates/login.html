<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Harness</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <span class="auth-wordmark">Harness</span>
    <div class="auth-heading">Sign in</div>
    {% if error %}
    <div class="form-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/auth/login">
      <div class="field">
        <label class="label">Username</label>
        <input class="input" name="username" required autofocus autocomplete="username">
      </div>
      <div class="field" style="margin-bottom:1.5rem;">
        <label class="label">Password</label>
        <input class="input" name="password" type="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.5rem;">
        Sign in
      </button>
    </form>
  </div>
</div>
</body>
</html>
